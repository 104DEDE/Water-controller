<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    <title>蓝牙水控器 · 现代版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #e0eafc 0%, #cfdef3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* 主卡片 */
        .card {
            max-width: 460px;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(20px);
            border-radius: 56px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), inset 0 1px 0 rgba(255,255,255,0.6);
            padding: 32px 28px 40px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.5);
        }

        /* 头部状态 */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #eef2ff;
            padding: 6px 16px;
            border-radius: 60px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #1e293b;
            margin-bottom: 20px;
        }
        .status-badge::before {
            content: "⚡";
            font-size: 0.9rem;
        }
        .status-badge.connected::before {
            content: "✅";
        }
        .status-badge.connected {
            background: #dcfce7;
            color: #166534;
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: #0f172a;
            margin-bottom: 6px;
        }
        .sub {
            color: #475569;
            font-size: 0.8rem;
            margin-bottom: 32px;
            border-left: 3px solid #3b82f6;
            padding-left: 12px;
        }

        /* 设备信息区 */
        .device-panel {
            background: #f8fafc;
            border-radius: 40px;
            padding: 16px 20px;
            margin: 20px 0 24px;
            border: 1px solid #e2e8f0;
        }
        .device-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748b;
            margin-bottom: 6px;
        }
        .device-name {
            font-weight: 600;
            font-size: 1rem;
            color: #0f172a;
            word-break: break-all;
            font-family: monospace;
        }

        /* 主按钮 */
        .main-button {
            width: 100%;
            background: #0f172a;
            border: none;
            border-radius: 60px;
            padding: 18px 24px;
            font-size: 1.3rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 8px 20px rgba(15,23,42,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .main-button:active {
            transform: scale(0.97);
        }
        .main-button:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }
        .main-button.on {
            background: #10b981;
            box-shadow: 0 8px 20px rgba(16,185,129,0.3);
        }
        .main-button.off {
            background: #ef4444;
            box-shadow: 0 8px 20px rgba(239,68,68,0.2);
        }

        /* 日志区域 */
        .log-container {
            margin-top: 28px;
            background: #0f172a;
            border-radius: 32px;
            padding: 16px;
        }
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #334155;
        }
        .log-header span {
            color: #94a3b8;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        .clear-log {
            background: none;
            border: none;
            color: #64748b;
            font-size: 0.7rem;
            cursor: pointer;
        }
        .log-area {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.7rem;
            color: #a5f3fc;
            height: 180px;
            overflow-y: auto;
			
           
            word-break: break-all;
            line-height: 1.4;
        }
		
		
        .log-area div {
            margin-bottom: 4px;
        }

        /* 不支持提示 */
        .unsupported {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }
        .unsupported h3 {
            margin-bottom: 12px;
        }
        .unsupported a {
            color: #3b82f6;
        }
    </style>
</head>
<body>

<div class="card supported">
    <div class="status-badge" id="statusBadge">未连接</div>
    <h1>💧 水控器</h1>
    <div class="sub">一键开启</div>

    <div class="device-panel">
        <div class="device-label">当前设备</div>
        <div class="device-name" id="deviceNameDisplay">未连接</div>
    </div>

    <button class="main-button" id="mainButton">
        <span>🔘</span> 开启
    </button>

    <div class="log-container">
        <div class="log-header">
            <span>📡 通信日志</span>
            <button class="clear-log" id="clearLogBtn">清空</button>
        </div>
        <div class="log-area" id="logArea">
            <span>> 就绪，点击「开启」连接水控器</span>
        </div>
    </div>
   
</div>

<div class="card unsupported">
    <h3>⚠️ 不支持的浏览器</h3>
    <p>需要支持 Web Bluetooth 的浏览器，如 Chrome、Edge 或安卓版浏览器。</p>
    <p><a href="#" target="_blank">查看支持列表</a></p>
</div>

<script>
    // ==================== 以下为 waterctl 原版核心代码（未改动任何逻辑）====================
    // 只修改了 UI 交互部分（日志输出、按钮文字、状态显示），蓝牙流程保持原样
    const bt = [];
    function an(msg) { console.log(msg); bt.push(msg); }
    function Xn() { bt.length = 0; }
    function Jn() { return bt.length === 0; }
    function cn(t) { return Array.from(new Uint8Array(t)).map(e => e.toString(16).padStart(2, "0")).join("").toUpperCase(); }
    function ne(t) { return t <= 0 ? 0 : t % 10 | ne(t / 10 | 0) << 4; }

    if (typeof BluetoothRemoteGATTCharacteristic !== "undefined") {
        const origWrite = BluetoothRemoteGATTCharacteristic.prototype.writeValue;
        BluetoothRemoteGATTCharacteristic.prototype.writeValue = function(e) {
            an("TXD: " + cn(e));
            return origWrite.apply(this, arguments);
        };
    }

    // 错误处理（简化）
    const errorHandlers = [
        { isHit: t => !!t.match(/WATERCTL INTERNAL Unknown RXD data/), output: (t, e) => { t.innerText = "接收到未知数据。"; }, isFatal: false, showLogs: true },
        { isHit: t => !!t.match(/WATERCTL INTERNAL (?:Refused|Bad key)/), output: (t, e) => { t.innerText = "水控器拒绝启动。"; }, isFatal: true, showLogs: true },
        { isHit: t => !!t.match(/WATERCTL INTERNAL Operation timed out/), output: (t, e) => { t.innerText = "等待时间太长。"; }, isFatal: false, showLogs: true },
        { isHit: t => !!t.match(/No Services matching UUID|GATT Error: Not supported/), output: (t, e) => { t.innerText = "不支持的机型。"; }, isFatal: true, showLogs: false },
        { isHit: t => !!t.match(/User denied|Web Bluetooth is not supported|Bluetooth adapter not available/), output: (t, e) => { t.innerText = "设备不支持蓝牙或权限未开启。"; }, isFatal: true, showLogs: false },
        { isHit: t => !!t.match(/NetworkError|GATT operation failed/), output: (t, e) => { t.innerText = "连接不稳定，请重试。"; }, isFatal: true, showLogs: false },
        { isHit: () => true, output: (t, e) => { t.innerText = e + " (可能是Bug)"; }, isFatal: true, showLogs: true }
    ];
    function handleError(t) {
        for (const h of errorHandlers) if (h.isHit(t.toString())) return h;
        return errorHandlers[errorHandlers.length-1];
    }

    const er = new Uint8Array([254,254,9,176,1,1,0,0]);
    const nr = new Uint8Array([254,254,9,179,0,0]);
    const rr = new Uint8Array([254,254,9,180,0,0]);
    const or = new Uint8Array([254,254,9,188,0,0]);
    const sr = new Uint8Array([254,254,9,186,0,0]);

    function crc16(t) {
        let e = 4119;
        for (let n = 0; n < t.length; n++) {
            e ^= t.charCodeAt(n);
            for (let r = 0; r < 8; r++) (e & 1) ? (e >>= 1, e ^= 40961) : e >>= 1;
        }
        return e;
    }
    function crc8(t) {
        let e = 27167;
        for (let n = 0; n < t.length; n++) {
            e ^= t[n];
            for (let r = 0; r < 8; r++) (e & 1) ? (e >>= 1, e ^= 40961) : e >>= 1;
        }
        return (e ^ 117) & 255;
    }

    function fr() {
        const t = Math.floor(Math.random() * 9999) + 1;
        return new Uint8Array([t >> 8, t & 255]).map(ne);
    }
    function lr() {
        const t = new Date().toLocaleString("zh-CN", { timeZone: "Asia/Shanghai" });
        const e = t.split(" ")[0].split("/").map(o => parseInt(o));
        const n = t.split(" ")[1].split(":").map(o => parseInt(o));
        return [e[0] % 100, ...e.slice(1), ...n].map(ne);
    }

    const wasmBase64 = "AGFzbQEAAAABCAFgBH9/f38AAwIBAAUDAQABBxQCBm1lbW9yeQIAB21ha2VLZXkAAAq7BAG4BAEFfyABQf8BRiAAQQFxQQFGcQRAIABBAmohAwsgAEGBAkYEQEEAIQALIANBB3EhBCADQX9BB3NxIQggCEEBQQN0cQRAIARBBHMhBAsgCEEBQQR0cQRAIARBBHMhBAsgCEEBQQV0cQRAIARBBHMhBAsgCEEBQQZ0cQRAIARBBHMhBAsgCEEBQQd0cQRAIARBBHMhBAsgBEEAIAFqLQAAcyEEIABBAUEAdHEEQCAEQQFzIQQLIABBAUEBdHEEQCAEQQFzIQQLIABBAUECdHEEQCAEQQJzIQQLIABBAUEDdHEEQCAEQQdzIQQLIABBAUEEdHEEQCAEQQFzIQQLIABBAUEFdHEEQCAEQQFzIQQLIABBAUEGdHEEQCAEQQFzIQQLIABBAUEHdHEEQCAEQQFzIQQLIAJBB3EhBiACQX9BB3NxIQggCEEBQQN0cQRAIAZBBHMhBgsgCEEBQQR0cQRAIAZBBHMhBgsgCEEBQQV0cQRAIAZBBHMhBgsgCEEBQQZ0cQRAIAZBBHMhBgsgCEEBQQd0cQRAIAZBBHMhBgsgBkGABiABQQ9xai0AAHMhBkGAAiABai0AACADcyEDQYAEIABqLQAAIANzIQNBkAogA2otAAAhBUGQBiABai0AACACcyECQZAIIABqLQAAIAJzIQJBkAwgAmotAAAhB0GzEEGSDyAEai0AADoAAEGyEEGQDiAFai0AADoAAEGxEEGiECAGai0AADoAAEGwEEGgDyAHai0AADoAAAsLtxABAEEAC7AQAAQFAAEFBAABBQQBAAQFAAEFBAEABAUBAAQFAAEFBAABBQQBAAQFAQAEBQABBQQBAAQFAAEFBAABBQQBAAQFAAEFBAEABAUBAAQFAAEFBAEABAUAAQUEAAEFBAEABAUBAAQFAAEFBAABBQQBAAQFAAEFBAEABAUBAAQFAAEFBAABBQQBAAQFAQAEBQABBQQBAAQFAAEFBAABBQQBAAQFAQAEBQABBQQAAQUEAQAEBQABBQQBAAQFAQAEBQABBQQBAAQFAAEFBAABBQQBAAQFAAEFBAEABAUBAAQFAAEFBAABBQQBAAQFAQAEBQABBQQBAAQFAAEFBAABBQQBAAQFAABAgcABQYDAAUGAwQBAgcABQYDBAECBwQBAgcABQYDAAUGAwQBAgcEAQIHAAUGAwQBAgcABQYDAAUGAwQBAgcABQYDBAECBwQBAgcABQYDBAECBwAFBgMABQYDBAECBwQBAgcABQYDAAUGAwQBAgcABQYDBAECBwQBAgcABQYDAAUGAwQBAgcEAQIHAAUGAwQBAgcABQYDAAUGAwQBAgcEAQIHAAUGAwAFBgMEAQIHAAUGAwQBAgcEAQIHAAUGAwQBAgcABQYDAAUGAwQBAgcABQYDBAECBwQBAgcABQYDAAUGAwQBAgcEAQIHAAUGAwQBAgcABQYDAAUGAwQBAgcAAAQEAAgMDAgcGBgcFBAQFDQwMDQ8ODg8KCwsKCAkJCBkYGBkbGhobHh8fHhwdHRwUFRUUFhcXFhMSEhMREBARMTAwMTMyMjM2Nzc2NDU1NDw9PTw+Pz8+Ozo6Ozk4ODkoKSkoKisrKi8uLi8tLCwtJSQkJScmJiciIyMiICEhIGFgYGFjYmJjZmdnZmRlZWRsbW1sbm9vbmtqamtpaGhpeHl5eHp7e3p/fn5/fXx8fXV0dHV3dnZ3cnNzcnBxcXBQUVFQUlNTUldWVldVVFRVXVxcXV9eXl9aW1taWFlZWElISElLSkpLTk9PTkxNTUxERUVERkdHRkNCQkNBQEBBAAEBAwMCAgYGBwcFBQQEAAABwQPDwgIGxscHxQUExAzMzQ3PDw7OygoLywnJyAgY2NkZ2xsa2t4eH98d3dwc1BQV1RfX1hYS0tMT0REQ0DDw     let wasmInstance = null;
    async function loadWasm() {
        const binary = atob(wasmBase64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        const module = await WebAssembly.instantiate(bytes, {});
        wasmInstance = module.instance;
    }
    async function makeKey(a,b,c,d) {
        if (!wasmInstance) await loadWasm();
        const exports = wasmInstance.exports;
        exports.makeKey(a,b,c,d);
        const mem = new Uint32Array(exports.memory.buffer);
        const result = mem[524];
        return new Uint8Array([result>>24, result>>16, result>>8, result]);
    }
    async function buildPr(t, e) {
        const n = new Uint8Array(t);
        const r = n[5], o = n.slice(6,8), s = n.slice(8,10);
        const i = (o[0]<<8)|o[1];
        const a = i+1;
        const c = a===65535 ? new Uint8Array([1,0]) : new Uint8Array([a>>8, a&255]);
        const u = await makeKey(o[0], o[1], s[0], s[1]);
        const l = e.slice(-4).split("").map(w=>w.charCodeAt(0)-48);
        const f = u.map((w,y)=>w^l[y]);
        const h = new Uint8Array([r, ...c, ...f, 254,135,0,0,0,0,0,0]);
        const d = crc8(h);
        return new Uint8Array([254,254,9,175,d,...h]);
    }
    function buildNt(t, e=false) {
        const n = crc16(t.slice(-5));
        const r = e ? 11 : 255;
        const o = fr(), s = lr();
        return new Uint8Array([254,254,9,178,1, n&255, n>>8, r, 0, ...o, ...s, 15,39,0]);
    }

    let gattDevice = null, writeChar = null, notifyChar = null;
    let isWaterRunning = false;
    let timeoutId = null, retryTimeout = null;

    // UI 元素绑定
    const mainButton = document.getElementById('mainButton');
    const deviceNameSpan = document.getElementById('deviceNameDisplay');
    const statusBadge = document.getElementById('statusBadge');
    const logArea = document.getElementById('logArea');
    const clearLogBtn = document.getElementById('clearLogBtn');

    // 自定义日志输出到UI
    function addUILog(msg, isError = false) {
        const div = document.createElement('div');
        div.style.color = isError ? '#f87171' : '#7dd3fc';
        div.innerText = `> ${msg}`;
        logArea.appendChild(div);
        div.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // 重写 an 以同时输出到UI
    const originalAn = an;
    window.an = function(msg) {
        originalAn(msg);
        if (msg.startsWith('TXD:') || msg.startsWith('RXD:')) {
            addUILog(msg);
        } else {
            addUILog(msg);
        }
    };
    an = window.an;

    function setButtonState(state) {
        if (state === "pending") {
            mainButton.disabled = true;
            mainButton.innerHTML = '<span>⏳</span> 请稍候';
            mainButton.classList.remove('on', 'off');
        } else if (state === "ok") {
            mainButton.disabled = false;
            mainButton.innerHTML = '<span>🔴</span> 结束';
            mainButton.classList.add('on');
            mainButton.classList.remove('off');
        } else if (state === "standby") {
            mainButton.disabled = false;
            mainButton.innerHTML = '<span>🔘</span> 开启';
            mainButton.classList.remove('on', 'off');
        }
    }

    function updateDeviceUI(name) {
        if (name) {
            deviceNameSpan.innerText = name;
            statusBadge.classList.add('connected');
            statusBadge.innerText = '已连接';
        } else {
            deviceNameSpan.innerText = '未连接';
            statusBadge.classList.remove('connected');
            statusBadge.innerText = '未连接';
        }
    }

    async function disconnect() {
        if (gattDevice && gattDevice.gatt.connected) gattDevice.gatt.disconnect();
        isWaterRunning = false;
        Xn();
        clearTimeout(timeoutId);
        clearTimeout(retryTimeout);
        setButtonState("standby");
        updateDeviceUI(null);
        addUILog('已断开连接', false);
    }

    async function handleErrorWrapper(e) {
        const errStr = e.toString();
        const handler = handleError(errStr);
        // 原版有dialog，这里简化为在日志中显示错误
        addUILog(`错误: ${errStr}`, true);
        if (handler.isFatal) {
            addUILog('致命错误，断开连接', true);
            await disconnect();
        }
        throw e;
    }

    async function onNotification(event) {
        const value = event.target.value;
        an("RXD: " + cn(value.buffer));
        try {
            let data = new Uint8Array(value.buffer);
            if (data[0] === 65 && data[1] === 84 && data[2] === 43) return;
            if (data[0] !== 253 && data[0] !== 9) throw new Error("WATERCTL INTERNAL Unknown RXD data");
            if (data[1] === 9) data = new Uint8Array([253, ...data]);
            if (data[0] === 9) data = new Uint8Array([253,253, ...data]);
            if (data.length < 4) return;
            switch (data[3]) {
                case 176: case 177:
                    clearTimeout(timeoutId);
                    timeoutId = setTimeout(() => writeChar.writeValue(buildNt(gattDevice.name)), 500);
                    break;
                case 174:
                    clearTimeout(timeoutId);
                    await writeChar.writeValue(await buildPr(data, gattDevice.name));
                    break;
                case 175:
                    if (data[5] === 85) await writeChar.writeValue(buildNt(gattDevice.name, true));
                    else if ([1,2,4].includes(data[5])) throw new Error("WATERCTL INTERNAL Bad key");
                    else throw new Error("WATERCTL INTERNAL Unknown RXD data");
                    break;
                case 178:
                    clearTimeout(timeoutId); clearTimeout(retryTimeout);
                    isWaterRunning = true;
                    setButtonState("ok");
                    addUILog('✅ 水控器已就绪，点击「结束」关闭', false);
                    break;
                case 179:
                    await writeChar.writeValue(rr);
                    disconnect();
                    break;
                case 186:
                    await writeChar.writeValue(sr);
                    break;
                case 188:
                    await writeChar.writeValue(or);
                    break;
                case 200:
                    throw new Error("WATERCTL INTERNAL Refused");
                default:
                    throw new Error("WATERCTL INTERNAL Unknown RXD data");
            }
        } catch(e) { handleErrorWrapper(e); }
    }

    function startTimeout() {
        retryTimeout = setTimeout(() => handleErrorWrapper("WATERCTL INTERNAL Operation timed out"), 15000);
    }

    async function start() {
        try {
            addUILog('开始扫描水控器（遍历所有前缀，需10-20秒）...');
            gattDevice = await navigator.bluetooth.requestDevice({
                filters: "0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").map(c => ({ namePrefix: c })),
                optionalServices: [61936]
            });
            updateDeviceUI(gattDevice.name || "未知设备");
            setButtonState("pending");
            addUILog(`已选择设备: ${gattDevice.name}`);
            const server = await gattDevice.gatt.connect();
            addUILog('GATT 连接成功');
            const service = await server.getPrimaryService(61936);
            writeChar = await service.getCharacteristic(61937);
            notifyChar = await service.getCharacteristic(61938);
            await notifyChar.startNotifications();
            notifyChar.addEventListener("characteristicvaluechanged", onNotification);
            await writeChar.writeValue(er);
            startTimeout();
        } catch(e) { handleErrorWrapper(e); }
    }

    async function stop() {
        try {
            await writeChar.writeValue(nr);
            startTimeout();
        } catch(e) { handleErrorWrapper(e); }
    }

    function toggle() {
        if (isWaterRunning) {
            stop();
        } else {
            start();
        }
    }

    mainButton.addEventListener("click", toggle);
    clearLogBtn.addEventListener("click", () => {
        logArea.innerHTML = '';
        addUILog('日志已清空');
    });

    if (!navigator.bluetooth) {
        document.querySelector(".supported").style.display = "none";
        document.querySelector(".unsupported").style.display = "block";
    }
    loadWasm().catch(e => console.error("WASM加载失败", e));
</script>
</body>
</html>
